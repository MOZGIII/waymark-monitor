global:
  scrape_interval: 15s

scrape_configs:
  - job_name: postgres
    static_configs:
      - targets: ["localhost:9187"]
  - job_name: pg
    static_configs:
      - targets: ["localhost:9630"]
  - job_name: node
    static_configs:
      - targets: ["localhost:9100"]
  - job_name: waymark
    static_configs:
      - targets: ["localhost:9118"]
